<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | 404 Not Found</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-md);
            background-color: var(--bg-color);
            text-align: center;
        }

        .error-card {
            width: 100%;
            max-width: 600px;
            padding: 4rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            font-family: var(--font-heading);
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: var(--spacing-sm);
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .error-title {
            font-size: 2rem;
            font-family: var(--font-heading);
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
        }

        .error-msg {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
        }

        .error-actions button {
            padding: 12px 24px;
            font-size: 1.05rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Subtle background decoration for neumorphic feel */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: var(--surface-color);
            box-shadow: var(--neu-shadow);
            z-index: -1;
            opacity: 0.5;
        }

        .bg-circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
        }

        .bg-circle-2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            right: -50px;
        }
    </style>
</head>

<body>

    <!-- Preloader -->
    <div class="earth">
        <div class="earth-loader">

            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

                    fill="#7CC133"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

                    fill="#7CC133"></path>
            </svg>
        </div>
        <p>Connecting...</p>
    </div>

    <div class="error-container">
        <div class="neu-card error-card">
            <div class="bg-circle bg-circle-1"></div>
            <div class="bg-circle bg-circle-2"></div>

            <a href="index.html" style="display:inline-block; margin-bottom: 2rem;">
                <img src="./stackly - Copy.webp" alt="Stackly Logo"
                    style="height: 48px; width: auto; object-fit: contain;">
            </a>

            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-msg">Oops! The page you are looking for might have been removed, had its name changed, or is
                temporarily unavailable.</p>

            <div class="error-actions">
                <button class="neu-button" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i> Go Back
                </button>
                <button class="neu-button primary" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Home
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
