<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | Forgot Password</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-md);
            background-color: var(--bg-color);
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .auth-logo {
            margin-bottom: var(--spacing-lg);
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .auth-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .auth-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            margin-top: var(--spacing-md);
        }

        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: var(--spacing-lg);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="neu-card auth-card">
            <a href="index.html">
                <img src="./stackly - Copy.webp" alt="Stackly Logo" class="auth-logo">
            </a>
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

            <form action="error.html" method="GET" id="forgotForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="neu-input w-100" placeholder="user@example.com">
                </div>

                <button type="submit" class="neu-button primary auth-btn">Send Reset Link</button>
            </form>

            <a href="login.html" class="auth-link auth-back">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <!-- Theme Logic & Form Validation -->
    <script src="app.js"></script>
    <script src="form_validation.js"></script>
</body>

</html>
