<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | Sign Up</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-md);
            background-color: var(--bg-color);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .auth-logo {
            margin-bottom: var(--spacing-lg);
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .d-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        @media (max-width: 480px) {
            .d-grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .auth-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .auth-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            margin-top: var(--spacing-sm);
        }
    </style>
</head>

<body>

    <!-- Preloader -->
    <div class="earth">
        <div class="earth-loader">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <path transform="translate(100 100)"
                    d="M29.4,-17.4C33.1,1.8,27.6,16.1,11.5,31.6C-4.7,47,-31.5,63.6,-43,56C-54.5,48.4,-50.7,16.6,-41,-10.9C-31.3,-38.4,-15.6,-61.5,-1.4,-61C12.8,-60.5,25.7,-36.5,29.4,-17.4Z"
                    fill="#7CC133"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <path transform="translate(100 100)"
                    d="M31.7,-55.8C40.3,-50,45.9,-39.9,49.7,-29.8C53.5,-19.8,55.5,-9.9,53.1,-1.4C50.6,7.1,43.6,14.1,41.8,27.6C40.1,41.1,43.4,61.1,37.3,67C31.2,72.9,15.6,64.8,1.5,62.2C-12.5,59.5,-25,62.3,-31.8,56.7C-38.5,51.1,-39.4,37.2,-49.3,26.3C-59.1,15.5,-78,7.7,-77.6,0.2C-77.2,-7.2,-57.4,-14.5,-49.3,-28.4C-41.2,-42.4,-44.7,-63,-38.5,-70.1C-32.2,-77.2,-16.1,-70.8,-2.3,-66.9C11.6,-63,23.1,-61.5,31.7,-55.8Z"
                    fill="#7CC133"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <path transform="translate(100 100)"
                    d="M30.6,-49.2C42.5,-46.1,57.1,-43.7,67.6,-35.7C78.1,-27.6,84.6,-13.8,80.3,-2.4C76.1,8.9,61.2,17.8,52.5,29.1C43.8,40.3,41.4,53.9,33.7,64C26,74.1,13,80.6,2.2,76.9C-8.6,73.1,-17.3,59,-30.6,52.1C-43.9,45.3,-61.9,45.7,-74.1,38.2C-86.4,30.7,-92.9,15.4,-88.6,2.5C-84.4,-10.5,-69.4,-20.9,-60.7,-34.6C-52.1,-48.3,-49.8,-65.3,-40.7,-70C-31.6,-74.8,-15.8,-67.4,-3.2,-61.8C9.3,-56.1,18.6,-52.3,30.6,-49.2Z"
                    fill="#7CC133"></path>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <path transform="translate(100 100)"
                    d="M39.4,-66C48.6,-62.9,51.9,-47.4,52.9,-34.3C53.8,-21.3,52.4,-10.6,54.4,1.1C56.3,12.9,61.7,25.8,57.5,33.2C53.2,40.5,39.3,42.3,28.2,46C17,49.6,8.5,55.1,1.3,52.8C-5.9,50.5,-11.7,40.5,-23.6,37.2C-35.4,34,-53.3,37.5,-62,32.4C-70.7,27.4,-70.4,13.7,-72.4,-1.1C-74.3,-15.9,-78.6,-31.9,-73.3,-43C-68.1,-54.2,-53.3,-60.5,-39.5,-60.9C-25.7,-61.4,-12.9,-56,1.1,-58C15.1,-59.9,30.2,-69.2,39.4,-66Z"
                    fill="#7CC133"></path>
            </svg>
        </div>
        <p>Connecting...</p>
    </div>

    <div class="auth-container">
        <div class="neu-card auth-card animate-card">
            <a href="index.html">
                <img src="./stackly - Copy.webp" alt="Stackly Logo" class="auth-logo site-logo animate-fade">
            </a>
            <h1 class="auth-title animate-text">Create an Account</h1>
            <p class="auth-subtitle">Join the professional community today</p>

            <form action="error.html" method="GET" id="signupForm" novalidate>

                <div class="d-grid-2">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="neu-input w-100" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="neu-input w-100" placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="neu-input w-100" placeholder="user@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="neu-input w-100" placeholder="1234567890">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" class="neu-input w-100"
                            style="padding-right: 40px;" placeholder="Create a password (min. 8 chars)">
                        <i class="fas fa-eye toggle-password"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="neu-input w-100"
                            style="padding-right: 40px;" placeholder="Confirm your password">
                        <i class="fas fa-eye toggle-password"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);"></i>
                    </div>
                </div>

                <button type="submit" class="neu-button primary auth-btn">Sign Up</button>
            </form>

            <p class="text-secondary" style="margin-top: var(--spacing-lg); font-size: 0.95rem;">
                Already have an account? <a href="login.html" class="auth-link">Log in</a>
            </p>
        </div>
    </div>

    <!-- Animation Libraries -->
    <script src="https://unpkg.com/split-type"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="animations.js"></script>
    <!-- Theme Logic & Form Validation -->
    <script src="app.js"></script>
    <script src="form_validation.js"></script>
</body>

</html>
