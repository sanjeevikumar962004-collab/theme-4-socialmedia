<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly | Sign Up</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-md);
            background-color: var(--bg-color);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .auth-logo {
            margin-bottom: var(--spacing-lg);
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: var(--spacing-xs);
            color: var(--text-primary);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: var(--spacing-md);
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .d-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }

        @media (max-width: 480px) {
            .d-grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .auth-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .auth-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.05rem;
            margin-top: var(--spacing-sm);
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="neu-card auth-card">
            <a href="index.html">
                <img src="./stackly - Copy.webp" alt="Stackly Logo" class="auth-logo">
            </a>
            <h1 class="auth-title">Create an Account</h1>
            <p class="auth-subtitle">Join the professional community today</p>

            <form action="error.html" method="GET" id="signupForm" novalidate>

                <div class="d-grid-2">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" class="neu-input w-100" placeholder="John">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" class="neu-input w-100" placeholder="Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="neu-input w-100" placeholder="user@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="neu-input w-100" placeholder="1234567890">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" class="neu-input w-100"
                            style="padding-right: 40px;" placeholder="Create a password (min. 8 chars)">
                        <i class="fas fa-eye toggle-password"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="neu-input w-100"
                            style="padding-right: 40px;" placeholder="Confirm your password">
                        <i class="fas fa-eye toggle-password"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary);"></i>
                    </div>
                </div>

                <button type="submit" class="neu-button primary auth-btn">Sign Up</button>
            </form>

            <p class="text-secondary" style="margin-top: var(--spacing-lg); font-size: 0.95rem;">
                Already have an account? <a href="login.html" class="auth-link">Log in</a>
            </p>
        </div>
    </div>

    <!-- Theme Logic & Form Validation -->
    <script src="app.js"></script>
    <script src="form_validation.js"></script>
</body>

</html>
